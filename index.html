<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happiest Birthday</title>

  <style>
    body {
      background-color: black;
      color: #00ff9f;
      font-family: "Courier New", monospace;
      padding: 40px;
    }

    #terminal {
      white-space: pre-line;
      font-size: 18px;
    }

    .cursor {
      display: inline-block;
      width: 10px;
      background: #00ff9f;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0% {opacity: 1;}
      50% {opacity: 0;}
      100% {opacity: 1;}
    }

    #enterBtn {
      display: none;
      margin-top: 30px;
      padding: 10px 20px;
      border: 2px solid #00ff9f;
      background: black;
      color: #00ff9f;
      cursor: pointer;
    }

    #enterBtn:hover {
      background: #00ff9f;
      color: black;
    }

    /* 🔥 SECRET WARNING STYLE */
    .secret {
      color: red;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- 🎵 HIDDEN MUSIC PLAYER -->
  <iframe id="musicFrame" width="0" height="0" style="display:none;"></iframe>

  <div id="terminal"></div>
  <span class="cursor"></span>

  <br><br>
  <button id="enterBtn" onclick="goNext()">ENTER SYSTEM</button>

  <script>
    const text = [
      "UMBRELLA CORPORATION SYSTEM",
      "Initializing...",
      "Subject AHMAD Identified",
      "ERROR CODE: E001",
      "",
      "Cross-referencing date... Match found: [17th April 2008]",
      "Not a threat.",
      "[SECRET_WARNING]",
      "",
      "You can now open the confidential file."
    ];

    let i = 0;
    let j = 0;

    function typeLine() {
      const terminal = document.getElementById("terminal");

      if (i < text.length) {

        let line = text[i];

        // 🔥 SECRET WARNING HANDLING
        if (line === "[SECRET_WARNING]") {

          if (j === 0) {
            terminal.innerHTML += `<span id="secret" class="secret">████████████████████</span>`;
          }

          j++;

          if (j === 1) {
            setTimeout(() => {
              const secret = document.getElementById("secret");

              secret.onmouseenter = () => {
                secret.textContent =
                  "WARNING: No Blood is Ever free of its trace of fungal mold";
              };

              secret.onmouseleave = () => {
                secret.textContent = "████████████████████";
              };
            }, 500);
          }

          setTimeout(typeLine, 30);
          return;
        }

        // NORMAL TYPING
        if (j < line.length) {
          terminal.innerHTML += line.charAt(j);
          j++;
          setTimeout(typeLine, 30);
        } else {
          terminal.innerHTML += "\n";
          i++;
          j = 0;
          setTimeout(typeLine, 500);
        }

      } else {
        document.getElementById("enterBtn").style.display = "block";
      }
    }

    function goNext() {
      document.getElementById("musicFrame").src =
        "https://www.youtube.com/embed/8g6a1sZq6C8?autoplay=1&loop=1&playlist=8g6a1sZq6C8";

      window.location.href = "main.html";
    }

    typeLine();
  </script>

</body>
</html>
