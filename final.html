<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Umbrella Archive - System Override</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: "Courier New", monospace;
  background: black;
  color: white;
  transition: 2s ease;
}

/* GLITCH INTRO TEXT */
#glitchScreen {
  position: absolute;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 10;
}

.glitchText {
  font-size: 28px;
  color: red;
  text-shadow: 0 0 10px red;
  animation: flicker 0.2s infinite;
}

@keyframes flicker {
  0% {opacity: 1;}
  50% {opacity: 0.3;}
  100% {opacity: 1;}
}

/* MAIN BIRTHDAY SCREEN */
#main {
  display: none;
  width: 100%;
  height: 100vh;
  text-align: center;
  position: relative;
  overflow: hidden;
  background: radial-gradient(circle at top, #ffe6f0, #ffd1dc, #fff0f5);
}

/* TITLE */
h1 {
  margin-top: 80px;
  font-size: 50px;
  color: #ff4d88;
  text-shadow: 0 0 15px rgba(255, 77, 136, 0.6);
  animation: pop 1.5s ease forwards;
}

@keyframes pop {
  from {transform: scale(0.5); opacity: 0;}
  to {transform: scale(1); opacity: 1;}
}

/* BUTTON */
button {
  margin-top: 30px;
  padding: 12px 25px;
  border: none;
  background: #ff4d88;
  color: white;
  font-size: 16px;
  cursor: pointer;
  border-radius: 20px;
  transition: 0.3s;
}

button:hover {
  background: #ff1f6a;
}

/* CAKE */
#cake {
  font-size: 80px;
  margin-top: 40px;
  animation: float 3s infinite ease-in-out;
  cursor: pointer;
}

@keyframes float {
  0% {transform: translateY(0px);}
  50% {transform: translateY(-15px);}
  100% {transform: translateY(0px);}
}

/* FLOATING ITEMS */
.floating {
  position: absolute;
  font-size: 24px;
  animation: rise 6s linear infinite;
  opacity: 0.7;
}

@keyframes rise {
  from {
    transform: translateY(100vh) rotate(0deg);
    opacity: 1;
  }
  to {
    transform: translateY(-10vh) rotate(360deg);
    opacity: 0;
  }
}
</style>
</head>

<body>

<!-- GLITCH INTRO -->
<div id="glitchScreen">
  <div class="glitchText">SYSTEM OVERRIDE DETECTED</div>
  <div class="glitchText">INITIALIZING BIRTHDAY MODE...</div>
</div>

<!-- MAIN BIRTHDAY PAGE -->
<div id="main">

  <h1>🎉 HAPPIEST BIRTHDAY (MY) AHMAD 🎉</h1>

  <div id="cake" onclick="burst()">🎂</div>

  <button onclick="startCelebration()">HEHE CLICK FOR MORE CONFETTI 😛</button>

</div>

<!-- CONFETTI LIBRARY -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

// INTRO TRANSITION
setTimeout(() => {
  document.getElementById("glitchScreen").style.opacity = "0";
  document.getElementById("glitchScreen").style.transition = "2s";

  setTimeout(() => {
    document.getElementById("glitchScreen").style.display = "none";
    document.getElementById("main").style.display = "block";

    launchConfetti();
    startFloating();
  }, 2000);

}, 3000);

// CONFETTI BURST FUNCTION
function launchConfetti() {
  var duration = 5 * 1000;
  var end = Date.now() + duration;

  (function frame() {
    confetti({
      particleCount: 5,
      angle: 60,
      spread: 70,
      origin: { x: 0 }
    });
    confetti({
      particleCount: 5,
      angle: 120,
      spread: 70,
      origin: { x: 1 }
    });

    if (Date.now() < end) {
      requestAnimationFrame(frame);
    }
  })();
}

// BUTTON CELEBRATION
function startCelebration() {
  confetti({
    particleCount: 200,
    spread: 120
  });
}

// CAKE CLICK
function burst() {
  confetti({
    particleCount: 100,
    spread: 80,
    origin: { y: 0.6 }
  });
}

// FLOATING OBJECTS
function startFloating() {
  const items = ["🎀","✨","😛","😛","😛","⭐"];

  setInterval(() => {
    const el = document.createElement("div");
    el.className = "floating";
    el.innerHTML = items[Math.floor(Math.random() * items.length)];

    el.style.left = Math.random() * 100 + "vw";
    el.style.fontSize = (20 + Math.random() * 30) + "px";
    el.style.animationDuration = (4 + Math.random() * 3) + "s";

    document.body.appendChild(el);

    setTimeout(() => {
      el.remove();
    }, 7000);

  }, 300);
}

</script>

</body>
</html>
