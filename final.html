<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Umbrella Archive - System Override</title>

<style>
/* =======================
   BASE SYSTEM STYLE
======================= */

body {
  margin: 0;
  overflow: hidden;
  font-family: "Courier New", monospace;

  background: #050608;
  color: #b6ffea;
  position: relative;
}

/* =======================
   "I LOVE YOU" BACKGROUND
======================= */

body::before {
  content: "I LOVE YOU  I LOVE YOU  I LOVE YOU  I LOVE YOU  I LOVE YOU  I LOVE YOU  I LOVE YOU";
  position: fixed;
  top: 0;
  left: 0;
  width: 200%;
  height: 200%;

  font-size: 24px;
  letter-spacing: 2px;
  line-height: 60px;

  color: rgba(255, 92, 122, 0.08);
  white-space: pre-wrap;

  transform: rotate(-15deg);
  animation: moveText 25s linear infinite;

  pointer-events: none;
  z-index: 0;
}

@keyframes moveText {
  from {
    transform: translate(0, 0) rotate(-15deg);
  }
  to {
    transform: translate(-300px, -300px) rotate(-15deg);
  }
}

/* =======================
   NEON LIGHT GLOW LAYERS
======================= */

body::after {
  content: "";
  position: fixed;
  width: 100%;
  height: 100%;
  top: 0;
  left: 0;

  background:
    radial-gradient(circle at 20% 30%, rgba(0,255,180,0.18), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(255,92,122,0.15), transparent 40%),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05), transparent 60%);

  animation: pulse 6s infinite;

  pointer-events: none;
  z-index: 0;
}

@keyframes pulse {
  0% { opacity: 0.4; }
  50% { opacity: 0.8; }
  100% { opacity: 0.4; }
}

/* =======================
   GLITCH INTRO SCREEN
======================= */

#glitchScreen {
  position: absolute;
  width: 100%;
  height: 100%;
  background: black;

  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;

  z-index: 10;
}

.glitchText {
  font-size: 28px;
  color: #ff4d6d;
  text-shadow: 0 0 10px #ff4d6d;
  animation: flicker 0.2s infinite;
}

@keyframes flicker {
  0% {opacity: 1;}
  50% {opacity: 0.3;}
  100% {opacity: 1;}
}

/* =======================
   MAIN BIRTHDAY SCREEN
======================= */

#main {
  display: none;
  width: 100%;
  height: 100vh;

  text-align: center;
  position: relative;
  overflow: hidden;

  z-index: 2;
}

h1 {
  margin-top: 80px;
  font-size: 50px;

  color: #ff5c7a;
  text-shadow:
    0 0 10px rgba(255, 92, 122, 0.6),
    0 0 20px rgba(0,255,180,0.2);

  animation: pop 1.5s ease forwards;
}

@keyframes pop {
  from {transform: scale(0.5); opacity: 0;}
  to {transform: scale(1); opacity: 1;}
}

/* =======================
   BUTTON
======================= */

button {
  margin-top: 30px;
  padding: 12px 25px;

  border: 1px solid rgba(0,255,180,0.6);
  background: rgba(0,0,0,0.6);
  color: #b6ffea;

  font-size: 16px;
  cursor: pointer;
  border-radius: 20px;

  transition: 0.3s;

  box-shadow: 0 0 10px rgba(0,255,180,0.2);
}

button:hover {
  background: rgba(0,255,180,0.15);
  color: white;
  box-shadow: 0 0 20px rgba(255, 92, 122, 0.3);
}

/* =======================
   CAKE
======================= */

#cake {
  font-size: 80px;
  margin-top: 40px;

  animation: float 3s infinite ease-in-out;
  cursor: pointer;

  filter: drop-shadow(0 0 10px rgba(0,255,180,0.4));
}

@keyframes float {
  0% {transform: translateY(0px);}
  50% {transform: translateY(-15px);}
  100% {transform: translateY(0px);}
}

/* =======================
   FLOATING OBJECTS
======================= */

.floating {
  position: absolute;
  font-size: 24px;
  animation: rise 6s linear infinite;
  opacity: 0.7;
  z-index: 1;
}

@keyframes rise {
  from {
    transform: translateY(100vh) rotate(0deg);
    opacity: 1;
  }
  to {
    transform: translateY(-10vh) rotate(360deg);
    opacity: 0;
  }
}
</style>
</head>

<body>

<!-- GLITCH SCREEN -->
<div id="glitchScreen">
  <div class="glitchText">SYSTEM OVERRIDE DETECTED</div>
  <div class="glitchText">INITIALIZING BIRTHDAY MODE...</div>
</div>

<!-- MAIN -->
<div id="main">

  <h1>🎉 HAPPIEST BIRTHDAY (MY) AHMAD 🎉</h1>

  <div id="cake" onclick="burst()">🎂</div>

  <button onclick="startCelebration()">
    HEHE CLICK FOR MORE CONFETTI 😛
  </button>

</div>

<!-- CONFETTI -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

/* INTRO */
setTimeout(() => {
  document.getElementById("glitchScreen").style.opacity = "0";
  document.getElementById("glitchScreen").style.transition = "2s";

  setTimeout(() => {
    document.getElementById("glitchScreen").style.display = "none";
    document.getElementById("main").style.display = "block";

    launchConfetti();
    startFloating();
  }, 2000);

}, 3000);

/* CONFETTI LOOP */
function launchConfetti() {
  var duration = 5 * 1000;
  var end = Date.now() + duration;

  (function frame() {
    confetti({
      particleCount: 5,
      angle: 60,
      spread: 70,
      origin: { x: 0 }
    });

    confetti({
      particleCount: 5,
      angle: 120,
      spread: 70,
      origin: { x: 1 }
    });

    if (Date.now() < end) {
      requestAnimationFrame(frame);
    }
  })();
}

/* BUTTON */
function startCelebration() {
  confetti({
    particleCount: 200,
    spread: 120
  });
}

/* CAKE */
function burst() {
  confetti({
    particleCount: 100,
    spread: 80,
    origin: { y: 0.6 }
  });
}

/* FLOATING OBJECTS */
function startFloating() {
  const items = ["🎀","✨","⭐","💚","❤️","🎂"];

  setInterval(() => {
    const el = document.createElement("div");
    el.className = "floating";
    el.innerHTML = items[Math.floor(Math.random() * items.length)];

    el.style.left = Math.random() * 100 + "vw";
    el.style.fontSize = (20 + Math.random() * 30) + "px";
    el.style.animationDuration = (4 + Math.random() * 3) + "s";

    document.body.appendChild(el);

    setTimeout(() => {
      el.remove();
    }, 7000);

  }, 300);
}

</script>

</body>
</html>
